<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Librería de Componentes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Galería de Componentes</h1>
    <div class="panel-grid">
      <div class="panel" data-component="custom-input">Custom Input</div>
      <div class="panel" data-component="custom-select">Select Dinámico</div>
      <div class="panel" data-component="date-range">Date Range</div>
      <div class="panel" data-component="custom-modal-comp">Sistema de Modal</div>
      <div class="panel" data-component="data-table">Data Table</div>
    </div>
  </div>

  <div id="component-modal" class="modal-overlay hidden">
    <div class="modal-content glass">
      <button id="close-modal" class="close-btn">&times;</button>
      <h2 id="modal-title">Nombre del Componente</h2>
      
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="components/input-text/index.js"></script>
  <script type="module" src="components/select-dinamico/index.js"></script>
  <script type="module" src="components/date-range/index.js"></script>
  <script type="module" src="components/modal/index.js"></script>
  <script type="module" src="./components/table/index.js"></script>
  
  <script src="app.js"></script>
</body>
</html>
